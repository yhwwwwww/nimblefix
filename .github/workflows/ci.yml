name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc-13, gcc-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc-13" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq g++-13
            echo "CC=gcc-13" >> $GITHUB_ENV
            echo "CXX=g++-13" >> $GITHUB_ENV
          elif [[ "${{ matrix.compiler }}" == "gcc-14" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq g++-14
            echo "CC=gcc-14" >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
          fi

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure
        run: xmake f -m release --toolchain=gcc -y

      - name: Build tools
        run: |
          xmake build fastfix-xml2ffd 
          xmake build fastfix-dictgen

      - name: Generate FIX44 artifacts
        run: |
          mkdir -p build/bench build/generated
          wget -q https://raw.githubusercontent.com/quickfix/quickfix/master/spec/FIX44.xml \
               -O build/bench/quickfix_FIX44.xml
          ./build/linux/x86_64/release/fastfix-xml2ffd \
              --xml build/bench/quickfix_FIX44.xml \
              --output build/bench/quickfix_FIX44.ffd \
              --profile-id 4400
          ./build/linux/x86_64/release/fastfix-dictgen \
              --input build/bench/quickfix_FIX44.ffd \
              --output build/bench/quickfix_FIX44.art \
              --cpp-builders build/generated/fix44_builders.h
          ./build/linux/x86_64/release/fastfix-dictgen \
              --input samples/basic_profile.ffd \
              --merge samples/basic_overlay.ffd \
              --output build/sample-basic.art \
              --cpp-builders build/generated/sample_basic_builders.h

      - name: Build
        run: xmake build -y

      - name: Run tests
        run: xmake run fastfix-tests
