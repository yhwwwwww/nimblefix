name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ubuntu-build-and-test:
    name: Ubuntu ${{ matrix.compiler }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc-13, gcc-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc-13" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq g++-13 xmake
            echo "CC=gcc-13" >> $GITHUB_ENV
            echo "CXX=g++-13" >> $GITHUB_ENV
          elif [[ "${{ matrix.compiler }}" == "gcc-14" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq g++-14 xmake
            echo "CC=gcc-14" >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
          fi

      - name: Configure, build, test, and benchmark smoke (xmake default)
        run: bash ./scripts/offline_build.sh --bench smoke

  rhel-build-and-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: RHEL 8.10 + GCC 12
            image: registry.access.redhat.com/ubi8/ubi:8.10
            preset: rhel8-gcc12
            other: cmake ninja-build
            toolchain_packages: gcc-toolset-12-gcc gcc-toolset-12-gcc-c++
            toolchain_enable: source /opt/rh/gcc-toolset-12/enable
          - name: RHEL 9.7 + GCC 14
            image: registry.access.redhat.com/ubi9/ubi:9.7
            preset: rhel9-gcc14
            other: cmake ninja-build liburing-devel
            toolchain_packages: gcc-toolset-14-gcc gcc-toolset-14-gcc-c++
            toolchain_enable: source /opt/rh/gcc-toolset-14/enable
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Pull container image
        run: docker pull ${{ matrix.image }}

      - name: Configure, build, test, and benchmark smoke in container (CMake alternative)
        shell: bash
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "${{ matrix.image }}" \
            bash -lc '
              set -euo pipefail
              dnf install -y -q --setopt=install_weak_deps=False \
                ${{ matrix.other }} \
                ${{ matrix.toolchain_packages }}
              ${{ matrix.toolchain_enable }}
              export CC="$(command -v gcc)"
              export CXX="$(command -v g++)"
              gcc --version
              g++ --version
              cmake --version
              ninja --version
              bash ./scripts/offline_build.sh --build-system cmake --preset "${{ matrix.preset }}" --bench smoke
            '
