name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        compiler: [gcc-13, gcc-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up compiler
        run: |
          if [[ "${{ matrix.compiler }}" == "gcc-13" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq g++-13
            echo "CC=gcc-13" >> $GITHUB_ENV
            echo "CXX=g++-13" >> $GITHUB_ENV
          elif [[ "${{ matrix.compiler }}" == "gcc-14" ]]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq g++-14
            echo "CC=gcc-14" >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
          fi

      - name: Install xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Configure
        run: xmake f -m release --toolchain=gcc -y

      - name: Build
        run: xmake build -y

      - name: Run tests
        run: xmake run fastfix-tests
